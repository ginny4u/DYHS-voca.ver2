    // 배열 섞기 함수
    function shuffleArray(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex !== 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    let sessionQuizData = [];
    let currentIdx = 0;
    let score = 0;
    let isAnswered = false;

    function initQuiz() {
        // 전체 문제 중 랜덤 5문제 추출
        const randomQuestions = shuffleArray([...allQuizData]).slice(0, 5);

        // 각 문제의 선지 섞기 (해설 텍스트도 객체 안에 묶여 함께 이동함)
        sessionQuizData = randomQuestions.map(q => {
            let shuffledOptions = shuffleArray([...q.options]);
            return { ...q, shuffledOptions: shuffledOptions };
        });

        currentIdx = 0;
        score = 0;
        loadQuestion();
    }

    function loadQuestion() {
        isAnswered = false;
        const data = sessionQuizData[currentIdx];
        
        document.getElementById('progress-text').innerText = `${currentIdx + 1} / 5`;
        document.getElementById('passage-content').innerHTML = `[제시문]<br><br>${data.passage}`;
        document.getElementById('question-text').innerText = `문항 ${currentIdx + 1}. ${data.question}`;
        
        const list = document.getElementById('options-list');
        list.innerHTML = "";
        
        // 섞인 선지를 차례대로 뿌려줌
        data.shuffledOptions.forEach((optObj, i) => {
            const li = document.createElement('li');
            li.className = "option-item";
            li.innerText = `①②③④⑤`[i] + ` ${optObj.text}`;
            li.onclick = () => checkAnswer(i);
            list.appendChild(li);
        });

        document.getElementById('feedback-box').style.display = "none";
        document.getElementById('next-btn').style.display = "none";
    }

    function checkAnswer(selectedIdx) {
        if (isAnswered) return;
        isAnswered = true;

        const data = sessionQuizData[currentIdx];
        const items = document.querySelectorAll('.option-item');
        
        // 섞여있는 배열 안에서 정답의 현재 인덱스 찾기
        const correctIdx = data.shuffledOptions.findIndex(opt => opt.isCorrect);
        const isUserCorrect = data.shuffledOptions[selectedIdx].isCorrect;

        if (isUserCorrect) {
            items[selectedIdx].classList.add('correct');
            score++;
        } else {
            items[selectedIdx].classList.add('wrong');
            items[correctIdx].classList.add('correct');
        }

        const feedback = document.getElementById('feedback-box');
        
        // 정답 안내 출력
        let feedbackHTML = `
            <div class="feedback-title">[정답 및 전체 선지 풀이]</div>
            <div style="color: #c0392b; font-weight: bold; margin-bottom: 8px;">정답: ${`①②③④⑤`[correctIdx]}</div>
        `;

        // 섞인 선지 순서 그대로 해설 출력 (번호 동기화 완벽 해결)
        feedbackHTML += `<div class="wrong-exp">`;
        data.shuffledOptions.forEach((opt, idx) => {
            feedbackHTML += `<strong>${`①②③④⑤`[idx]}</strong> ${opt.exp}<br>`;
        });
        feedbackHTML += `</div>`;

        feedback.innerHTML = feedbackHTML;
        feedback.style.display = "block";
        feedback.style.backgroundColor = isUserCorrect ? "#e8f4fd" : "#fdf2f2";

        document.getElementById('next-btn').style.display = "block";
        if (currentIdx === sessionQuizData.length - 1) {
            document.getElementById('next-btn').innerText = "최종 결과 확인하기";
        }
    }

    function handleNext() {
        currentIdx++;
        if (currentIdx < sessionQuizData.length) {
            loadQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-view').style.display = "none";
        document.getElementById('result-view').style.display = "block";
        document.getElementById('final-score').innerText = `${score} / 5`;
        
        let comment = "";
        
        if (score === 5) {
            comment = "좀 치는데? 진희T한테 자랑ㄱㄱ";
        } else if (score === 4) {
            comment = "살짝 아쉽긴 해. 한 번 더 해야 될 거 같긴 해";
        } else if (score === 3) {
            comment = "오늘 공부 많이 된다. 스트레스 많이 받을 거야..";
        } else {
            comment = "(숙연)................";
        }
        
        document.getElementById('result-comment').innerText = comment;
    }

    // 프로그램 시작 시 퀴즈 초기화
    initQuiz();
